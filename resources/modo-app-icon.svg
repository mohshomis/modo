<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <!-- Background — teal rounded square -->
  <rect width="1024" height="1024" rx="228" fill="#0d9488"/>

  <!-- Body — white -->
  <ellipse cx="512" cy="540" rx="280" ry="300" fill="#ffffff"/>

  <!-- Antenna — white -->
  <line x1="415" y1="260" x2="370" y2="160" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
  <circle cx="365" cy="148" r="18" fill="#ffffff"/>
  <line x1="465" y1="248" x2="490" y2="155" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <circle cx="493" cy="145" r="12" fill="#ffffff" opacity="0.7"/>

  <!-- Eyes — teal (same as background = cutout look) -->
  <circle cx="430" cy="500" r="48" fill="#0d9488"/>
  <circle cx="594" cy="500" r="48" fill="#0d9488"/>

  <!-- Mouth — teal (cutout) -->
  <path d="M410 660 L594 654" stroke="#0d9488" stroke-width="14" stroke-linecap="round"/>
  <path d="M588 654 L618 636" stroke="#0d9488" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
</svg>
